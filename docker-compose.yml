services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rbtestdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rbtestdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build:
      context: ./auth-service
      dockerfile: ../Dockerfile.service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rbtestdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
    depends_on:
      postgres:
        condition: service_healthy

  usrsys-service:
    build:
      context: ./usrsys-service
      dockerfile: ../Dockerfile.service
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      - auth-service

  make-service:
    build:
      context: ./make-service
      dockerfile: ../Dockerfile.service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rbtestdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY:-fb560341-ba13-42eb-9e2f-fad6f7701d75}
    depends_on:
      postgres:
        condition: service_healthy

  review-service:
    build:
      context: ./review-service
      dockerfile: ../Dockerfile.service
    environment:
      SPRING_MONGODB_URI: mongodb://mongo:27017/routebuddy_reviews
    depends_on:
      mongo:
        condition: service_healthy

  routesview-service:
    build:
      context: ./routesview-service
      dockerfile: ../Dockerfile.service
    environment:
      SERVICES_MAKE_SERVICE: http://make-service:8084
      SERVICES_REVIEW_SERVICE: http://review-service:8085
      SPRING_MONGODB_URI: mongodb://mongo:27017/rtbuddydb
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY:-fb560341-ba13-42eb-9e2f-fad6f7701d75}
    depends_on:
      - make-service
      - review-service

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - usrsys-service
      - routesview-service

volumes:
  postgres-data:
  mongo-data:
