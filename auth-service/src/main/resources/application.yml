server:
  port: 8081
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rbtestdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  main:
    allow-bean-definition-overriding: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:3600000}

service:
  internal-token: ${INTERNAL_SERVICE_TOKEN:}

logging:
  level:
    org.springframework.web: INFO
    org.springframework.boot.autoconfigure.web: WARN
    org.springframework.boot.actuate.endpoint.web: WARN
