<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход - RouteBuddy</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
          as="style" onload="this.rel='stylesheet'">
    <link rel="icon" href="data:image/x-icon;base64," type="image/x-icon">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4a5568;
            --secondary-color: #2d3748;
            --accent-color: #718096;
            --light-gray: #f7fafc;
            --medium-gray: #e2e8f0;
            --dark-gray: #2d3748;
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --text-light: #718096;
            --card-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.08);
        }

        body {
            background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%);
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', 'Noto Sans', sans-serif;
            color: var(--text-primary);
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow-color);
            overflow: hidden;
            border: 1px solid var(--medium-gray);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-3px);
        }

        .header-section {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-container {
            padding: 2.5rem 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            padding-right: 3.5rem;
            border: 2px solid var(--medium-gray);
            border-radius: 10px;
            background: var(--light-gray);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(74, 85, 104, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 30 px;
            background: transparent;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .password-toggle:hover {
            color: var(--primary-color);
            background: rgba(113, 128, 150, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--secondary-color), #1a202c);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 55, 72, 0.2);
        }

        .link-secondary {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .link-secondary:hover {
            color: var(--primary-color);
            transform: translateX(2px);
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-light);
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--medium-gray);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .notification {
            padding: 1rem 1.2rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid;
            background: var(--light-gray);
        }

        .notification.error {
            border-left-color: #f56565;
            background: rgba(245, 101, 101, 0.1);
            color: #c53030;
        }

        .notification.info {
            border-left-color: #4299e1;
            background: rgba(66, 153, 225, 0.1);
            color: #2b6cb0;
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--medium-gray);
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .login-card {
                margin: 1rem;
                box-shadow: 0 4px 15px var(--shadow-color);
            }

            .header-section {
                padding: 2rem 1.5rem;
            }

            .form-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="login-card w-full max-w-md">
        <!-- Заголовок -->
        <div class="header-section">
            <div class="logo-container">
                <i class="fas fa-mountain text-3xl"></i>
                <h1 class="text-3xl font-bold">RouteBuddy</h1>
            </div>
            <h2 class="text-xl opacity-90">Вход в систему</h2>
            <p class="text-sm opacity-75 mt-2">Продолжайте свое путешествие</p>
        </div>

        <!-- Сообщения об ошибках -->
        <div th:if="${param.error}" class="notification error mx-6 mt-6">
            <i class="fas fa-exclamation-circle mr-2"></i>
            Неверное имя пользователя или пароль
        </div>

        <div th:if="${param.logout}" class="notification info mx-6 mt-6">
            <i class="fas fa-check-circle mr-2"></i>
            Вы успешно вышли из системы
        </div>

        <!-- Форма авторизации -->
        <div class="form-container">
            <form th:action="@{/login}" method="post">
                <!-- Скрытое поле для redirectUrl -->
                <input type="hidden" name="redirectUrl" th:value="${param.redirectUrl}">

                <!-- Имя пользователя -->
                <div class="input-group">
                    <label for="username">
                        <i class="fas fa-user mr-2"></i>Логин
                    </label>
                    <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Введите имя пользователя"
                            required
                            class="input-field"
                            autocomplete="username"
                    >
                </div>

                <!-- Пароль -->
                <div class="input-group">
                    <label for="password">
                        <i class="fas fa-lock mr-2"></i>Пароль
                    </label>
                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Введите пароль"
                            required
                            class="input-field"
                            autocomplete="current-password"
                    >
                    <button
                            type="button"
                            class="password-toggle"
                            onclick="togglePasswordVisibility('password', this)"
                    >
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <!-- Запомнить меня (опционально) -->
                <div class="flex items-center mb-6">
                    <input
                            type="checkbox"
                            id="remember-me"
                            name="remember-me"
                            class="mr-2 h-4 w-4 text-primary-color rounded border-gray-300 focus:ring-primary-color"
                    >
                    <label for="remember-me" class="text-sm text-gray-600">
                        Запомнить меня
                    </label>
                </div>

                <!-- Кнопка "Войти" -->
                <button
                        type="submit"
                        class="btn-primary"
                >
                    <i class="fas fa-sign-in-alt"></i>
                    Войти
                </button>

                <!-- Разделитель -->
                <div class="divider text-sm">или</div>

                <!-- Ссылка на регистрацию -->
                <div class="text-center">
                    <a
                            th:href="@{/register(redirectUrl=${param.redirectUrl})}"
                            class="link-secondary"
                    >
                        <i class="fas fa-user-plus"></i>
                        Создать аккаунт
                    </a>
                </div>
            </form>


        </div>
    </div>
</div>

<!-- JS-скрипт для показа/скрытия пароля -->
<script>
    function togglePasswordVisibility(fieldId, button) {
        const passwordField = document.getElementById(fieldId);
        const icon = button.querySelector('i');

        if (passwordField.type === "password") {
            passwordField.type = "text";
            icon.className = "fas fa-eye-slash";
            button.setAttribute('aria-label', 'Скрыть пароль');
        } else {
            passwordField.type = "password";
            icon.className = "fas fa-eye";
            button.setAttribute('aria-label', 'Показать пароль');
        }
    }

    // Добавляем обработчики для улучшения UX
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form');
        const usernameField = document.getElementById('username');
        const passwordField = document.getElementById('password');

        // Автофокус на поле логина
        if (usernameField) {
            usernameField.focus();
        }

        // Обработка клавиши Enter
        form.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
                e.preventDefault();

                if (e.target === usernameField) {
                    passwordField.focus();
                } else if (e.target === passwordField) {
                    form.querySelector('button[type="submit"]').click();
                }
            }
        });

        // Валидация полей при вводе
        [usernameField, passwordField].forEach(field => {
            field.addEventListener('input', function() {
                if (this.value.trim() !== '') {
                    this.classList.remove('border-red-300');
                }
            });
        });
    });
</script>

</body>
</html>
