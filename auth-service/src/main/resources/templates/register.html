<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - RouteBuddy</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Noto+Sans:wght@400;500;700;900&display=swap"
          as="style" onload="this.rel='stylesheet'">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4a5568;
            --secondary-color: #2d3748;
            --accent-color: #718096;
            --light-gray: #f7fafc;
            --medium-gray: #e2e8f0;
            --dark-gray: #2d3748;
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --text-light: #718096;
            --card-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --success-color: #38a169;
            --error-color: #f56565;
        }

        body {
            background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%);
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', 'Noto Sans', sans-serif;
            color: var(--text-primary);
        }

        .register-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow-color);
            overflow: hidden;
            border: 1px solid var(--medium-gray);
            transition: transform 0.3s ease;
        }

        .register-card:hover {
            transform: translateY(-3px);
        }

        .header-section {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-container {
            padding: 2.5rem 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            padding-right: 3.5rem;
            border: 2px solid var(--medium-gray);
            border-radius: 10px;
            background: var(--light-gray);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(74, 85, 104, 0.1);
        }

        .input-field.error {
            border-color: var(--error-color);
            background: rgba(245, 101, 101, 0.05);
        }

        .input-field.success {
            border-color: var(--success-color);
            background: rgba(56, 161, 105, 0.05);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 30%;
            background: transparent;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .password-toggle:hover {
            color: var(--primary-color);
            background: rgba(113, 128, 150, 0.1);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .success-message {
            color: var(--success-color);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .strength-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--medium-gray);
            margin-top: 0.3rem;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .strength-weak {
            width: 33%;
            background: var(--error-color);
        }

        .strength-medium {
            width: 66%;
            background: #ed8936;
        }

        .strength-strong {
            width: 100%;
            background: var(--success-color);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--secondary-color), #1a202c);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 55, 72, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .link-secondary {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .link-secondary:hover {
            color: var(--primary-color);
            transform: translateX(2px);
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            margin: 1.5rem 0;
            gap: 0.8rem;
        }

        .terms-checkbox input[type="checkbox"] {
            margin-top: 0.2rem;
            accent-color: var(--primary-color);
        }

        .terms-checkbox label {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.5;
        }

        .terms-link {
            color: var(--primary-color);
            text-decoration: underline;
            font-weight: 600;
        }

        .features-list {
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--light-gray);
            border-radius: 10px;
            border: 1px solid var(--medium-gray);
        }

        .features-list h3 {
            color: var(--secondary-color);
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .feature-item i {
            color: var(--success-color);
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--medium-gray);
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .register-card {
                margin: 1rem;
                box-shadow: 0 4px 15px var(--shadow-color);
            }

            .header-section {
                padding: 2rem 1.5rem;
            }

            .form-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="register-card w-full max-w-md">
        <!-- Заголовок -->
        <div class="header-section">
            <div class="logo-container">
                <i class="fas fa-mountain text-3xl"></i>
                <h1 class="text-3xl font-bold">RouteBuddy</h1>
            </div>
            <h2 class="text-xl opacity-90">Регистрация</h2>
        </div>

        <!-- Сообщения об ошибках -->
        <div th:if="${error}" class="mx-6 mt-6 p-4 bg-red-50 border-l-4 border-red-500 rounded">
            <div class="flex items-center">
                <i class="fas fa-exclamation-triangle text-red-500 mr-3"></i>
                <span class="text-red-700 font-medium" th:text="${error}"></span>
            </div>
        </div>

        <!-- Форма регистрации -->
        <div class="form-container">
            <form
                    th:action="@{/register}"
                    th:object="${registrationRequest}"
                    method="post"
                    id="registerForm"
            >
                <!-- Скрытое поле для redirectUrl -->
                <input type="hidden" name="redirectUrl" th:value="${redirectUrl}">
                <input type="hidden" th:field="*{role}" value="USER">

                <!-- Имя пользователя -->
                <div class="input-group">
                    <label for="username">
                        <i class="fas fa-user-circle mr-2"></i>Имя пользователя
                    </label>
                    <input
                            type="text"
                            id="username"
                            th:field="*{username}"
                            placeholder="Придумайте уникальное имя"
                            required
                            class="input-field"
                            autocomplete="username"
                    >
                    <div
                            th:if="${#fields.hasErrors('username')}"
                            th:errors="*{username}"
                            class="error-message"
                    >
                    </div>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="email">
                        <i class="fas fa-envelope mr-2"></i>Email
                    </label>
                    <input
                            type="email"
                            id="email"
                            th:field="*{email}"
                            placeholder="Ваш email для входа"
                            required
                            class="input-field"
                            autocomplete="email"
                    >
                    <div
                            th:if="${#fields.hasErrors('email')}"
                            th:errors="*{email}"
                            class="error-message"
                    >
                    </div>
                </div>

                <!-- Пароль -->
                <div class="input-group">
                    <label for="password">
                        <i class="fas fa-key mr-2"></i>Пароль
                    </label>
                    <input
                            type="password"
                            id="password"
                            th:field="*{password}"
                            placeholder="Не менее 6 символов"
                            required
                            class="input-field"
                            autocomplete="new-password"
                            oninput="checkPasswordStrength(this.value)"
                    >
                    <button
                            type="button"
                            class="password-toggle"
                            onclick="togglePasswordVisibility('password', this), togglePasswordVisibility('confirmPassword', this)"
                    >
                        <i class="fas fa-eye"></i>
                    </button>

                    <!-- Индикатор сложности пароля -->
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div id="strengthFill" class="strength-fill strength-weak"></div>
                        </div>
                        <div id="strengthText" class="text-xs text-gray-500 mt-1">Слабый пароль</div>
                    </div>

                    <div
                            th:if="${#fields.hasErrors('password')}"
                            th:errors="*{password}"
                            class="error-message"
                    >
                    </div>
                </div>

                <!-- Подтверждение пароля -->
                <div class="input-group">
                    <label for="confirmPassword">
                        <i class="fas fa-key mr-2"></i>Подтверждение пароля
                    </label>
                    <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="Повторите пароль"
                            required
                            class="input-field"
                            autocomplete="new-password"
                            oninput="checkPasswordMatch()"
                    >

                    <div id="confirmMessage" class="text-xs mt-1"></div>
                </div>

                <!-- Кнопка регистрации -->
                <button
                        type="submit"
                        id="submitBtn"
                        class="btn-primary"
                >
                    <i class="fas fa-user-plus"></i>
                    Зарегистрироваться
                </button>
            </form>

            <!-- Ссылка на вход -->
            <div class="mt-6 text-center">
                <a th:href="@{/login}" class="link-secondary">
                    <i class="fas fa-sign-in-alt"></i>
                    Уже есть аккаунт? Войти
                </a>
            </div>

        </div>
    </div>
</div>

<!-- JS-скрипт -->
<script>
    // Функция для показа/скрытия пароля
    function togglePasswordVisibility(fieldId, button) {
        const passwordField = document.getElementById(fieldId);
        const icon = button.querySelector('i');

        if (passwordField.type === "password") {
            passwordField.type = "text";
            icon.className = "fas fa-eye-slash";
            button.setAttribute('aria-label', 'Скрыть пароль');
        } else {
            passwordField.type = "password";
            icon.className = "fas fa-eye";
            button.setAttribute('aria-label', 'Показать пароль');
        }
    }

    // Проверка сложности пароля
    function checkPasswordStrength(password) {
        const strengthBar = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        if (!password) {
            strengthBar.className = 'strength-fill strength-weak';
            strengthBar.style.width = '33%';
            strengthText.textContent = 'Слабый пароль';
            strengthText.className = 'text-xs text-gray-500 mt-1';
            return;
        }

        let strength = 0;

        // Проверки
        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        // Обновление индикатора
        if (strength <= 1) {
            strengthBar.className = 'strength-fill strength-weak';
            strengthBar.style.width = '33%';
            strengthText.textContent = 'Слабый пароль';
            strengthText.className = 'text-xs text-red-500 mt-1';
        } else if (strength <= 3) {
            strengthBar.className = 'strength-fill strength-medium';
            strengthBar.style.width = '66%';
            strengthText.textContent = 'Средний пароль';
            strengthText.className = 'text-xs text-yellow-500 mt-1';
        } else {
            strengthBar.className = 'strength-fill strength-strong';
            strengthBar.style.width = '100%';
            strengthText.textContent = 'Надежный пароль';
            strengthText.className = 'text-xs text-green-500 mt-1';
        }
    }

    // Проверка совпадения паролей
    function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const message = document.getElementById('confirmMessage');

        if (!confirmPassword) {
            message.textContent = '';
            message.className = 'text-xs mt-1';
            return;
        }

        if (password === confirmPassword) {
            message.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Пароли совпадают';
            message.className = 'text-xs text-green-500 mt-1';
        } else {
            message.innerHTML = '<i class="fas fa-times-circle mr-1"></i> Пароли не совпадают';
            message.className = 'text-xs text-red-500 mt-1';
        }
    }

    // Активация кнопки отправки
    function toggleSubmitButton() {
        const agreeTerms = document.getElementById('agreeTerms');
        const submitBtn = document.getElementById('submitBtn');
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (agreeTerms.checked && password && confirmPassword && password === confirmPassword) {
            submitBtn.disabled = false;
        } else {
            submitBtn.disabled = true;
        }
    }

    // Инициализация
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('registerForm');
        const usernameField = document.getElementById('username');

        // Автофокус
        if (usernameField) {
            usernameField.focus();
        }

        // Валидация при вводе
        const inputs = form.querySelectorAll('input[required]');
        inputs.forEach(input => {
            input.addEventListener('input', function() {
                if (this.value.trim() !== '') {
                    this.classList.remove('error');
                    this.classList.add('success');
                } else {
                    this.classList.remove('success');
                }

                // Проверяем условия для кнопки
                toggleSubmitButton();
            });
        });

        // Проверка пароля при загрузке
        checkPasswordStrength(document.getElementById('password').value);
        checkPasswordMatch();
    });
</script>

</body>
</html>
