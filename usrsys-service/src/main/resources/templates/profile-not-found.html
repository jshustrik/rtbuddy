<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль не найден | RouteBuddy</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: #f3f7f4;
            color: #23312f;
            font-family: "Segoe UI", system-ui, sans-serif;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .not-found-card {
            width: min(560px, 100%);
            background: #fff;
            border: 1px solid #d8e3dd;
            border-radius: 8px;
            padding: 36px;
            text-align: center;
        }
        .not-found-icon {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #e6f0eb;
            color: #1f6f68;
            font-size: 42px;
            margin-bottom: 18px;
        }
        .btn-routebuddy {
            background: #1f6f68;
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: .7rem 1.2rem;
            font-weight: 700;
        }
        .btn-routebuddy:hover {
            background: #174d49;
            color: #fff;
        }
    </style>
</head>
<body>
<main class="not-found-card">
    <div class="not-found-icon" aria-hidden="true">
        <i class="fas fa-cat"></i>
    </div>
    <h1 class="h3 fw-bold mb-2">Профиль не найден</h1>
    <p class="text-muted mb-4">
        Пользователь <strong th:text="${username}">unknown</strong> не найден или был удалён.
    </p>
    <div class="d-flex gap-2 justify-content-center flex-wrap">
        <a class="btn btn-routebuddy" href="/profile">Мой профиль</a>
        <a class="btn btn-outline-secondary" href="/routes">К маршрутам</a>
    </div>
</main>
</body>
</html>
