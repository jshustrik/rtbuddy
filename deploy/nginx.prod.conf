server {
    listen 80;
    server_name routebuddy.ru www.routebuddy.ru 81.26.191.140.nip.io _;
    client_max_body_size 10m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        default_type image/svg+xml;
        access_log off;
        expires 7d;
    }

    location = /favicon.ico {
        return 302 /favicon.svg;
    }

    location / {
        return 301 https://routebuddy.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name routebuddy.ru www.routebuddy.ru;
    client_max_body_size 10m;

    ssl_certificate /etc/letsencrypt/live/routebuddy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/routebuddy.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    if ($host = www.routebuddy.ru) {
        return 301 https://routebuddy.ru$request_uri;
    }

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect http://routebuddy.ru/ https://routebuddy.ru/;
    proxy_redirect http://www.routebuddy.ru/ https://routebuddy.ru/;

    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /favicon.ico {
        access_log off;
        return 302 /favicon.svg;
    }

    location = /favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        default_type image/svg+xml;
        access_log off;
        expires 7d;
    }

    location = / {
        return 302 https://$http_host/routes;
    }

    location = /login {
        proxy_pass http://auth-service:8081;
    }

    location = /register {
        proxy_pass http://auth-service:8081;
    }

    location /register/ {
        proxy_pass http://auth-service:8081;
    }

    location = /logout {
        proxy_pass http://auth-service:8081;
    }

    location /internal/users/ {
        proxy_pass http://auth-service:8081;
    }

    location /profile {
        proxy_pass http://usrsys-service:8082;
    }

    location /api/proxy/ {
        proxy_pass http://routesview-service:8083;
    }

    location /api/export/ {
        proxy_pass http://export-service:8086;
    }

    location /routes {
        proxy_pass http://routesview-service:8083;
    }

    location /constructor {
        proxy_pass http://routesview-service:8083;
    }

    location /route {
        proxy_pass http://routesview-service:8083;
    }

    location /export {
        proxy_pass http://routesview-service:8083;
    }

    location / {
        proxy_pass http://routesview-service:8083;
    }
}

server {
    listen 443 ssl;
    server_name 81.26.191.140.nip.io _;

    ssl_certificate /etc/letsencrypt/live/81.26.191.140.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/81.26.191.140.nip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://routebuddy.ru$request_uri;
}
