server {
    listen 80;
    server_name localhost 127.0.0.1 _;
    client_max_body_size 10m;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /favicon.ico {
        access_log off;
        return 302 /favicon.svg;
    }

    location = /favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
        default_type image/svg+xml;
        access_log off;
        expires 7d;
    }

    location = / {
        return 302 /routes;
    }

    location = /login {
        proxy_pass http://auth-service:8081;
    }

    location = /register {
        proxy_pass http://auth-service:8081;
    }

    location /register/ {
        proxy_pass http://auth-service:8081;
    }

    location = /logout {
        proxy_pass http://auth-service:8081;
    }

    location /internal/users/ {
        proxy_pass http://auth-service:8081;
    }

    location /profile {
        proxy_pass http://usrsys-service:8082;
    }

    location /api/proxy/ {
        proxy_pass http://routesview-service:8083;
    }

    location /api/export/ {
        proxy_pass http://export-service:8086;
    }

    location /routes {
        proxy_pass http://routesview-service:8083;
    }

    location /constructor {
        proxy_pass http://routesview-service:8083;
    }

    location /route {
        proxy_pass http://routesview-service:8083;
    }

    location /export {
        proxy_pass http://routesview-service:8083;
    }

    location / {
        proxy_pass http://routesview-service:8083;
    }
}
