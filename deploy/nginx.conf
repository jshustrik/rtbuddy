server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /favicon.ico {
        access_log off;
        return 204;
    }

    location = / {
        return 302 $scheme://$http_host/routes;
    }

    location = /login {
        proxy_pass http://auth-service:8081;
    }

    location = /register {
        proxy_pass http://auth-service:8081;
    }

    location /register/ {
        proxy_pass http://auth-service:8081;
    }

    location = /logout {
        proxy_pass http://auth-service:8081;
    }

    location /internal/users/ {
        proxy_pass http://auth-service:8081;
    }

    location /profile {
        proxy_pass http://usrsys-service:8082;
    }

    location /api/proxy/ {
        proxy_pass http://routesview-service:8083;
    }

    location /routes {
        proxy_pass http://routesview-service:8083;
    }

    location /constructor {
        proxy_pass http://routesview-service:8083;
    }

    location /route {
        proxy_pass http://routesview-service:8083;
    }

    location /export {
        proxy_pass http://routesview-service:8083;
    }

    location / {
        proxy_pass http://routesview-service:8083;
    }
}
