<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маршруты | RouteBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #4a5568; --secondary: #2d3748; --accent: #718096; --border: #e2e8f0; --light: #f7fafc; }
        body { background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: var(--secondary); }
        .navbar { background: linear-gradient(135deg, var(--secondary), var(--primary)); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .nav-link { color: rgba(255,255,255,.9) !important; font-weight: 500; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }
        .page-header { background: linear-gradient(135deg, var(--secondary), var(--primary)); border-radius: 16px; padding: 2rem 2.5rem; margin-bottom: 2rem; color: white; }
        .route-card { background: white; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,.07); border: 1px solid var(--border); border-left: 5px solid var(--accent); margin-bottom: 1.2rem; transition: transform .2s, box-shadow .2s; }
        .route-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.12); }
        .route-card-body { padding: 1.2rem 1.4rem; }
        .tag-badge { background: #edf2f7; color: var(--accent); font-size: .75rem; padding: .25rem .6rem; border-radius: 20px; margin-right: 4px; }
        .btn-primary-custom { background: #667eea; color: white; border: none; border-radius: 50px; padding: .5rem 1.4rem; font-weight: 600; }
        .btn-primary-custom:hover { background: #5a67d8; color: white; }
        .search-box { border-radius: 50px; border: 2px solid var(--border); padding: .5rem 1.2rem; }
        .search-box:focus { border-color: #667eea; box-shadow: none; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="fas fa-mountain me-2" style="font-size:1.4rem;"></i>
            <span class="fw-bold fs-5">RouteBuddy</span>
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item mx-1"><a class="nav-link active" href="/routes"><i class="fas fa-globe me-1"></i>Все маршруты</a></li>
                <li class="nav-item mx-1" th:if="${loggedIn}"><a class="nav-link" href="/routes?my=true"><i class="fas fa-user me-1"></i>Мои маршруты</a></li>
                <li class="nav-item mx-1" th:if="${loggedIn}"><a class="nav-link" href="http://localhost:8083/constructor"><i class="fas fa-tools me-1"></i>Конструктор</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="page-header">
        <h1><i class="fas fa-globe me-3"></i>
            <span th:text="${showMy} ? 'Мои маршруты' : 'Все маршруты'">Все маршруты</span>
        </h1>
        <p class="mb-0" style="opacity:.85;">Откройте любой маршрут, чтобы увидеть дни и точки.</p>
    </div>

    <!-- Search + filter -->
    <form method="get" action="/routes" class="d-flex gap-2 mb-4 flex-wrap">
        <input type="text" name="search" class="form-control search-box flex-grow-1"
               placeholder="Поиск по названию, описанию или тегам..."
               th:value="${search}">
        <input th:if="${showMy}" type="hidden" name="my" value="true">
        <button type="submit" class="btn btn-primary-custom">
            <i class="fas fa-search me-1"></i>Найти
        </button>
        <a th:if="${showMy}" href="/routes" class="btn btn-outline-secondary">Все маршруты</a>
        <a th:unless="${showMy}" th:if="${loggedIn}" href="/routes?my=true" class="btn btn-outline-secondary">Мои</a>
    </form>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(routes)}" class="text-center py-5 text-muted">
        <i class="fas fa-map-signs d-block mb-3" style="font-size:3rem;opacity:.4;"></i>
        <h5>Маршруты не найдены</h5>
        <p>Попробуйте изменить запрос или <a href="/routes">сбросить фильтр</a>.</p>
    </div>

    <!-- Route cards -->
    <div th:each="route : ${routes}">
        <div class="route-card">
            <div class="route-card-body">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <h5 class="mb-1 fw-bold">
                            <a th:href="@{/routes/{id}(id=${route.id})}" class="text-decoration-none text-dark"
                               th:text="${route.title}">Название маршрута</a>
                        </h5>
                        <div class="text-muted small mb-2" th:text="${route.description}"></div>
                        <div>
                            <span th:each="tag : ${#strings.arraySplit(route.tags, ',')}"
                                  th:if="${!#strings.isEmpty(#strings.trim(tag))}"
                                  class="tag-badge" th:text="${#strings.trim(tag)}"></span>
                        </div>
                    </div>
                    <div class="text-end">
                        <div class="text-muted small mb-2">
                            <i class="fas fa-user me-1"></i><span th:text="${route.authorUsername}"></span>
                        </div>
                        <a th:href="@{/routes/{id}(id=${route.id})}" class="btn btn-primary-custom btn-sm">
                            <i class="fas fa-eye me-1"></i>Открыть
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
