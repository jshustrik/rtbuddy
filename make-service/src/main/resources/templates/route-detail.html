<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${route.title} + ' | RouteBuddy'">Маршрут | RouteBuddy</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script th:src="|https://api-maps.yandex.ru/2.1/?apikey=${yandexMapsApiKey}&amp;lang=ru_RU|" type="text/javascript"></script>
    <style>
        :root { --primary: #4a5568; --secondary: #2d3748; --accent: #718096; --border: #e2e8f0; --light: #f7fafc; }
        body { background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: var(--secondary); }
        .navbar { background: linear-gradient(135deg, var(--secondary), var(--primary)); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .nav-link { color: rgba(255,255,255,.9) !important; font-weight: 500; }
        .nav-link:hover { color: #fff !important; }
        .page-header { background: linear-gradient(135deg, var(--secondary), var(--primary)); border-radius: 16px; padding: 2rem 2.5rem; margin-bottom: 2rem; color: white; }
        .day-card { background: white; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,.07); border: 1px solid var(--border); border-left: 5px solid var(--accent); margin-bottom: 1.5rem; overflow: hidden; }
        .day-card-header { background: var(--light); padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .day-num { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: var(--accent); color: white; border-radius: 50%; font-size: .85rem; font-weight: 700; flex-shrink: 0; }
        .day-card-body { padding: 1.1rem 1.25rem; }
        .pt-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
        .pt-dot { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: var(--border); color: var(--secondary); border-radius: 50%; font-size: .68rem; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
        .map-box { height: 220px; border-radius: 8px; border: 1px solid var(--border); margin-top: .75rem; }
        .tag-badge { background: #edf2f7; color: var(--accent); font-size: .75rem; padding: .25rem .6rem; border-radius: 20px; margin-right: 4px; }
        .point-photo { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; margin-top: 6px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="fas fa-mountain me-2" style="font-size:1.4rem;"></i>
            <span class="fw-bold fs-5">RouteBuddy</span>
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item mx-1"><a class="nav-link" href="/routes"><i class="fas fa-globe me-1"></i>Каталог маршрутов</a></li>
                <li class="nav-item mx-1" th:if="${loggedIn}"><a class="nav-link" href="/routes?my=true"><i class="fas fa-user me-1"></i>Мои</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="page-header">
        <h1 class="mb-1" th:text="${route.title}">Название маршрута</h1>
        <div style="opacity:.85;">
            <span><i class="fas fa-user me-1"></i><span th:text="${route.authorUsername}"></span></span>
            &nbsp;·&nbsp;
            <span th:each="tag : ${#strings.arraySplit(route.tags, ',')}"
                  th:if="${!#strings.isEmpty(#strings.trim(tag))}"
                  class="tag-badge" th:text="${#strings.trim(tag)}"></span>
        </div>
        <p class="mt-2 mb-0" th:text="${route.description}"></p>
    </div>

    <!-- Author controls -->
    <div th:if="${isAuthor}" class="mb-3 d-flex gap-2">
        <button class="btn btn-sm btn-outline-danger" onclick="deleteRoute()">
            <i class="fas fa-trash me-1"></i>Удалить маршрут
        </button>
    </div>

    <!-- Empty -->
    <div th:if="${#lists.isEmpty(route.days)}" class="text-center py-5 text-muted">
        <i class="fas fa-calendar-times d-block mb-3" style="font-size:3rem;opacity:.4;"></i>
        <h5>Дни маршрута не добавлены</h5>
    </div>

    <!-- Days -->
    <div th:each="day, dayStat : ${route.days}" class="day-card">
        <div class="day-card-header">
            <span class="day-num" th:text="${dayStat.index + 1}">1</span>
            <div>
                <div class="fw-semibold" th:text="${day.title}">День 1</div>
                <div style="font-size:.78rem;color:var(--accent);">День <span th:text="${day.dayNumber}"></span></div>
            </div>
        </div>
        <div class="day-card-body">
            <p class="text-muted small" th:text="${day.description}"></p>

            <div th:if="${!#lists.isEmpty(day.points)}">
                <div style="font-size:.78rem;font-weight:600;color:var(--accent);" class="mb-2">
                    📍 Точки маршрута (<span th:text="${#lists.size(day.points)}"></span>):
                </div>
                <div th:each="pt, ptStat : ${day.points}" class="pt-item">
                    <span class="pt-dot" th:text="${ptStat.index + 1}">1</span>
                    <div>
                        <div style="font-size:.85rem;font-weight:600;" th:text="${pt.name}">Точка</div>
                        <div class="text-muted" style="font-size:.78rem;" th:text="${pt.description}"></div>
                        <img th:if="${pt.photoUrl != null and !#strings.isEmpty(pt.photoUrl)}"
                             th:src="${pt.photoUrl}" class="point-photo" alt="Фото точки">
                    </div>
                </div>

                <div style="font-size:.78rem;font-weight:600;color:var(--accent);margin-top:.75rem;" class="mb-1">🗺 Карта дня:</div>
                <div th:id="'map-' + ${dayStat.index}" class="map-box"></div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a href="/routes" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Назад к списку
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const routeId = /*[[${route.id}]]*/ 0;

    // Serialize days+points from Thymeleaf to JS
    const daysData = /*[[${route.days}]]*/ [];

    if (window.ymaps) {
        ymaps.ready(function() {
            daysData.forEach(function(day, i) {
                if (!day.points || day.points.length === 0) return;
                const el = document.getElementById('map-' + i);
                if (!el) return;
                const pts = day.points.filter(p => Number.isFinite(Number(p.lat)) && Number.isFinite(Number(p.lon)));
                if (!pts.length) return;
                const lat = pts.reduce((s, p) => s + Number(p.lat), 0) / pts.length;
                const lon = pts.reduce((s, p) => s + Number(p.lon), 0) / pts.length;
                const map = new ymaps.Map(el, { center: [lat, lon], zoom: 13, controls: ['zoomControl', 'fullscreenControl'] });
                pts.forEach(function(p, j) {
                    map.geoObjects.add(new ymaps.Placemark([Number(p.lat), Number(p.lon)], {
                        balloonContentHeader: (j + 1) + '. ' + String(p.name || '')
                    }, { preset: 'islands#blueDotIcon' }));
                });
                if (pts.length > 1) {
                    map.geoObjects.add(new ymaps.Polyline(
                        pts.map(p => [Number(p.lat), Number(p.lon)]),
                        {},
                        { strokeColor: '#667eea', strokeWidth: 4, strokeOpacity: 0.85 }
                    ));
                }
                const bounds = map.geoObjects.getBounds();
                if (bounds) map.setBounds(bounds, { checkZoomRange: true, zoomMargin: 40 });
            });
        });
    } else {
        document.querySelectorAll('.map-box').forEach(el => {
            el.innerHTML = '<div class="text-center text-muted py-5">API Яндекс.Карт временно недоступен</div>';
        });
    }

    function deleteRoute() {
        if (!confirm('Удалить маршрут безвозвратно?')) return;
        fetch('/api/routes/' + routeId, { method: 'DELETE', credentials: 'include' })
            .then(r => { if (r.ok || r.status === 204) window.location.href = '/routes'; else alert('Ошибка удаления'); });
    }
</script>
</body>
</html>
