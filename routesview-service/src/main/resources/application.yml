server:
  port: 8083

spring:
  # DEMO: H2 in-memory replaces PostgreSQL — no external DB needed
  datasource:
    url: jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  main:
    allow-bean-definition-overriding: true
  mongodb:
    uri: mongodb://localhost:27017/rtbuddydb

jwt:
  secret: 'n4uB0oP1mQ6sT8yZ0xR3vL7eF2aD5jK9sU8iE4wQ1zC3bN6rT8vY0pL7kJ2dS9aF'
  expiration: 3600000

logging:
  level:
    root: WARN
    org.springframework.web: INFO
