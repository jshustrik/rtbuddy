server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:mem:routebuddydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  main:
    allow-bean-definition-overriding: true
  mongodb:
    uri: mongodb://localhost:27017/rtbuddydb

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:3600000}

services:
  make-service: http://localhost:8084
  review-service: http://localhost:8085
  internal-token: ${INTERNAL_SERVICE_TOKEN}

yandex:
  maps:
    api-key: ${YANDEX_MAPS_API_KEY:}

logging:
  level:
    root: WARN
    org.springframework.web: INFO
