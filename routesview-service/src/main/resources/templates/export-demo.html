<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предпросмотр маршрута | RouteBuddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        :root { --primary: #4a5568; --secondary: #2d3748; --accent: #718096; --border: #e2e8f0; --light: #f7fafc; }
        body { background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: var(--secondary); }
        .navbar { background: linear-gradient(135deg, var(--secondary), var(--primary)); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .nav-link { color: rgba(255,255,255,.9) !important; font-weight: 500; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }

        .page-header { background: linear-gradient(135deg, var(--secondary), var(--primary)); border-radius: 16px; padding: 2rem 2.5rem; margin-bottom: 2rem; color: white; }
        .page-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: .3rem; }

        .day-card { background: white; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,.07); border: 1px solid var(--border); border-left: 5px solid var(--accent); margin-bottom: 1.5rem; overflow: hidden; }
        .day-card-header { background: var(--light); padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .day-num { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: var(--accent); color: white; border-radius: 50%; font-size: .85rem; font-weight: 700; flex-shrink: 0; }
        .day-card-body { padding: 1.1rem 1.25rem; }
        .source-tag { color: var(--accent); font-size: .82rem; margin-bottom: .5rem; }
        .desc-text { color: #4a5568; font-size: .88rem; margin-bottom: 1rem; }
        .pts-label { font-size: .78rem; font-weight: 600; color: var(--accent); margin-bottom: .5rem; }
        .pt-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
        .pt-dot { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: var(--border); color: var(--secondary); border-radius: 50%; font-size: .68rem; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
        .map-box { height: 220px; border-radius: 8px; border: 1px solid var(--border); margin-top: .75rem; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--accent); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; }

        .btn-print { background: #667eea; color: white; border: none; border-radius: 50px; padding: .9rem 2.5rem; font-weight: 600; font-size: 1rem; transition: all .3s; }
        .btn-print:hover { background: #5a67d8; color: white; transform: translateY(-2px); }
        .btn-print:disabled { background: #a0aec0; cursor: default; transform: none; }

        #toast-msg { position: fixed; bottom: 20px; right: 20px; background: #2d3748; color: white; padding: .7rem 1.2rem; border-radius: 10px; z-index: 9999; font-size: .88rem; box-shadow: 0 4px 14px rgba(0,0,0,.22); display: none; }

        @media print {
            .navbar, .page-header, #actionBar { display: none !important; }
            body { background: white; }
            .day-card { box-shadow: none; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="fas fa-mountain me-2" style="font-size:1.4rem;"></i>
            <span class="fw-bold fs-5">RouteBuddy</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item mx-1"><a class="nav-link" href="/route"><i class="fas fa-map me-1"></i>Маршрут</a></li>
                <li class="nav-item mx-1"><a class="nav-link" href="/constructor"><i class="fas fa-tools me-1"></i>Конструктор</a></li>
                <li class="nav-item mx-1"><a class="nav-link active" href="/export"><i class="fas fa-file-pdf me-1"></i>Предпросмотр PDF</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="page-header">
        <h1><i class="fas fa-file-pdf me-3"></i>Предпросмотр маршрута</h1>
        <p class="mb-0" style="opacity:.85;">Проверьте маршрут перед сохранением в PDF. Карты загружаются автоматически.</p>
    </div>

    <!-- Пустое состояние (скрывается если есть дни) -->
    <div id="emptyState" class="empty-state" style="display:none;">
        <i class="fas fa-map-signs d-block"></i>
        <h4 class="mb-2">Маршрут пуст</h4>
        <p class="text-muted mb-3">Сначала добавьте дни в конструкторе маршрутов.</p>
        <a href="/constructor" class="btn btn-print">
            <i class="fas fa-tools me-2"></i>Перейти в конструктор
        </a>
    </div>

    <!-- Заголовок маршрута -->
    <div id="routeHeader" style="display:none;">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
            <div>
                <h2 id="routeNameDisplay" class="mb-1 fw-bold"></h2>
                <div class="text-muted small">
                    <span id="dayCountDisplay"></span> &nbsp;·&nbsp;
                    Дата: <span id="dateDisplay"></span> &nbsp;·&nbsp; RouteBuddy
                </div>
            </div>
            <div id="actionBar" class="d-flex gap-2 flex-wrap">
                <button id="printBtn" class="btn btn-print" disabled>
                    <i class="fas fa-spinner fa-spin me-2"></i>Загрузка карт...
                </button>
                <a href="/constructor" class="btn btn-outline-secondary">
                    <i class="fas fa-edit me-1"></i>Изменить
                </a>
            </div>
        </div>
    </div>

    <!-- Дни маршрута -->
    <div id="daysContainer"></div>

</div>

<div id="toast-msg"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const STORAGE_KEY = 'rtbuddy_my_route_v1';

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function pluralDays(n) {
        const m = n%10, h = n%100;
        if (m===1&&h!==11) return 'день';
        if ([2,3,4].includes(m)&&![12,13,14].includes(h)) return 'дня';
        return 'дней';
    }
    let _toastT;
    function showToast(msg) {
        const el = document.getElementById('toast-msg');
        el.textContent = msg; el.style.display = 'block';
        clearTimeout(_toastT); _toastT = setTimeout(() => el.style.display='none', 2500);
    }

    function init() {
        let days;
        try { days = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { days = []; }

        if (days.length === 0) {
            document.getElementById('emptyState').style.display = 'block';
            return;
        }

        // Show route header
        const routeName = localStorage.getItem('rtbuddy_route_name') || 'Мой маршрут';
        document.getElementById('routeHeader').style.display = 'block';
        document.getElementById('routeNameDisplay').textContent = routeName;
        document.getElementById('dayCountDisplay').textContent = days.length + ' ' + pluralDays(days.length);
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('ru-RU');

        // Render day cards
        const container = document.getElementById('daysContainer');
        container.innerHTML = days.map((d, i) => {
            const pts = d.points || [];
            const ptsHtml = pts.map((p, j) => `
                <div class="pt-item">
                    <span class="pt-dot">${j+1}</span>
                    <div>
                        <div style="font-size:.85rem;font-weight:600;">${esc(p.name)}</div>
                        <div class="text-muted" style="font-size:.78rem;">${esc(p.desc)}</div>
                    </div>
                </div>`).join('');

            const mapBlock = pts.length > 0
                ? `<div class="pts-label mt-3">🗺 Карта дня:</div>
                   <div id="map${i}" class="map-box"></div>`
                : '';

            return `
            <div class="day-card">
                <div class="day-card-header">
                    <span class="day-num">${i+1}</span>
                    <div>
                        <div class="fw-semibold">${esc(d.dayTitle)}</div>
                        <div style="font-size:.78rem;color:var(--accent);">${esc(d.routeTitle)}</div>
                    </div>
                </div>
                <div class="day-card-body">
                    <div class="desc-text">${esc(d.dayDesc)}</div>
                    ${pts.length > 0 ? `<div class="pts-label">📍 Точки маршрута (${pts.length}):</div>${ptsHtml}` : ''}
                    ${mapBlock}
                </div>
            </div>`;
        }).join('');

        // Init Leaflet maps
        let mapsReady = 0;
        const mapsTotal = days.filter(d => d.points && d.points.length > 0).length;

        if (mapsTotal === 0) {
            enablePrint();
            return;
        }

        days.forEach((d, i) => {
            const pts = d.points || [];
            if (!pts.length) return;

            const el = document.getElementById('map' + i);
            if (!el) return;

            const lat = pts.reduce((s,p) => s+p.lat, 0) / pts.length;
            const lon = pts.reduce((s,p) => s+p.lon, 0) / pts.length;
            const map = L.map(el, { zoomControl: true, attributionControl: false })
                         .setView([lat, lon], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            pts.forEach((p, j) => {
                L.marker([p.lat, p.lon]).addTo(map)
                 .bindPopup(`<strong>${j+1}. ${p.name}</strong>`);
            });
            map.once('moveend', () => {
                mapsReady++;
                if (mapsReady >= mapsTotal) enablePrint();
            });
        });

        // Fallback — enable print after 5s regardless
        setTimeout(enablePrint, 5000);
    }

    function enablePrint() {
        const btn = document.getElementById('printBtn');
        if (!btn || !btn.disabled) return;
        btn.innerHTML = '<i class="fas fa-print me-2"></i>Сохранить как PDF';
        btn.disabled = false;
        btn.onclick = () => {
            // Store route name for print
            const nameEl = document.getElementById('routeNameDisplay');
            if (nameEl) localStorage.setItem('rtbuddy_route_name', nameEl.textContent);
            window.print();
        };
    }

    // Save route name input if navigating back from constructor
    document.addEventListener('DOMContentLoaded', () => {
        // Sync route name from constructor if available
        const constructorName = localStorage.getItem('rtbuddy_route_name_constructor');
        if (constructorName) localStorage.setItem('rtbuddy_route_name', constructorName);
        init();
    });
</script>
</body>
</html>
