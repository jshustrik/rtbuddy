<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | RouteBuddy</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rb-bg: #f3f7f4;
            --rb-ink: #23312f;
            --rb-muted: #64706d;
            --rb-line: #d8e3dd;
            --rb-primary: #1f6f68;
            --rb-primary-dark: #174d49;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            background: var(--rb-bg);
            color: var(--rb-ink);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: var(--rb-primary-dark);
            border-bottom: 1px solid rgba(255,255,255,.12);
        }
        .nav-link {
            color: rgba(255,255,255,.9) !important;
            border-radius: 8px;
            padding: .55rem .75rem !important;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #fff !important;
            background: rgba(255,255,255,.1);
        }
        .not-found-wrap {
            min-height: calc(100vh - 64px);
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }
        .not-found-card {
            width: min(720px, 100%);
            background: #fff;
            border: 1px solid var(--rb-line);
            border-radius: 8px;
            padding: 44px;
            text-align: center;
            box-shadow: 0 16px 42px rgba(31, 77, 73, .08);
        }
        .not-found-icon {
            width: 82px;
            height: 82px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 22px;
            background: #e7f1ed;
            color: var(--rb-primary);
            font-size: 2.25rem;
        }
        .not-found-code {
            color: var(--rb-primary);
            font-size: .9rem;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        h1 {
            font-size: clamp(1.8rem, 3vw, 2.55rem);
            font-weight: 800;
            margin-bottom: 12px;
        }
        p {
            color: var(--rb-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0 auto 28px;
            max-width: 520px;
        }
        .btn-rb {
            background: var(--rb-primary);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            padding: .82rem 1.2rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: .5rem;
        }
        .btn-rb:hover {
            background: var(--rb-primary-dark);
            color: #fff;
        }
        .btn-soft {
            border: 1px solid var(--rb-line);
            border-radius: 8px;
            color: var(--rb-ink);
            font-weight: 700;
            padding: .82rem 1.2rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            margin-left: 8px;
        }
        .btn-soft:hover {
            background: #f7faf7;
            color: var(--rb-ink);
        }
        @media (max-width: 575px) {
            .not-found-card { padding: 30px 20px; }
            .btn-rb, .btn-soft {
                width: 100%;
                justify-content: center;
                margin: 0 0 10px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/routes">
            <i class="fas fa-mountain me-2" style="font-size:1.4rem;"></i>
            <span class="fw-bold fs-5">RouteBuddy</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item mx-1"><a class="nav-link" href="/routes"><i class="fas fa-compass me-1"></i>Каталог маршрутов</a></li>
                <li class="nav-item mx-1"><a class="nav-link" href="/routes/create"><i class="fas fa-plus-circle me-1"></i>Создать маршрут</a></li>
                <li class="nav-item mx-1"><a class="nav-link" href="/constructor"><i class="fas fa-layer-group me-1"></i>Конструктор</a></li>
                <li class="nav-item mx-1"><a class="nav-link" href="/export"><i class="fas fa-file-pdf me-1"></i>Выгрузка PDF</a></li>
                <li class="nav-item mx-1"><a class="nav-link" href="/profile"><i class="fas fa-user-circle me-1"></i>Профиль</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="not-found-wrap">
    <section class="not-found-card" aria-labelledby="notFoundTitle">
        <div class="not-found-icon" aria-hidden="true">
            <i class="fas fa-map-signs"></i>
        </div>
        <div class="not-found-code">404</div>
        <h1 id="notFoundTitle">Страница не найдена</h1>
        <p>
            Такой страницы нет или ссылка была набрана с ошибкой.
            Вернитесь к маршрутам или откройте профиль.
        </p>
        <div>
            <a class="btn-rb" href="/routes"><i class="fas fa-compass"></i>К маршрутам</a>
            <a class="btn-soft" href="/profile"><i class="fas fa-user-circle"></i>В профиль</a>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
